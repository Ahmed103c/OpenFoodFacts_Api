spring.application.name=Nutrition
server.port=8081
spring.datasource.hikari.connection-init-sql=SET NAMES 'UTF8'
spring.jpa.properties.hibernate.jdbc.charset=UTF-8

spring.datasource.url=jdbc:postgresql://localhost:5433/products_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect




